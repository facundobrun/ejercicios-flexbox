<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 19 - Formulario con etiquetas alineadas</title>
    <link rel="stylesheet" href="../css/ejercicio19.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/minilogo.png">
</head>
<body>
<form class="formulario">
    <div class="campo">
        <label>Nombre</label>
        <input type="text">
    </div>
    <div class="campo">
        <label>Email</label>
        <input type="email">
    </div>
    <div class="campo">
        <label>Teléfono</label>
        <input type="tel">
    </div>
    
    <button type="submit" class="btn-enviar">Enviar</button>
</form>
</body>
</html>
